services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --port ${REDIS_PORT:-6379}

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: backend/.env
    environment:
      YTDLP_CONFIG: /app/config/yt-dlp.conf
      HTTPS_PROXY: socks5://host.docker.internal:1080
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      UPLOAD_DIR: /app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config
      - ${SFTP_KEY_FILE}:/app/secrets/sftp_key:ro
      - uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app

  worker:
    build: ./backend
    restart: unless-stopped
    command: arq worker.main.WorkerSettings
    env_file: backend/.env
    environment:
      YTDLP_CONFIG: /app/config/yt-dlp.conf
      HTTPS_PROXY: socks5://host.docker.internal:1080
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      UPLOAD_DIR: /app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config
      - ${SFTP_KEY_FILE}:/app/secrets/sftp_key:ro
      - uploads:/app/uploads
    depends_on:
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app

  bot:
    build: ./backend
    restart: unless-stopped
    command: python bot/main.py
    env_file: backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot_db:/app/data
    environment:
      DB_PATH: /app/data/metamusic.db
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app

volumes:
  uploads:
  bot_db:
