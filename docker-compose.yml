services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      YTDLP_CONFIG: /app/config/yt-dlp.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${MUSIC_LIBRARY_PATH}:/music
      - ./config:/app/config
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app