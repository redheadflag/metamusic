# yt-dlp configuration
# This file is mounted into the container at /app/config/yt-dlp.conf

# Cookies (export from browser using "Get cookies.txt LOCALLY" extension)
--cookies /app/config/cookies.txt

# Proxy — uncomment and set if your server IP is blocked
# --proxy socks5://user:password@host:port
# --proxy http://user:password@host:port

# Browser impersonation — makes requests look like a real Chrome browser
--user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
--add-header "Accept:text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
--add-header "Accept-Language:en-US,en;q=0.9"
--add-header "Accept-Encoding:gzip, deflate, br"
--add-header "Referer:https://soundcloud.com"
--add-header "Sec-Fetch-Dest:document"
--add-header "Sec-Fetch-Mode:navigate"
--add-header "Sec-Fetch-Site:same-origin"

# Rate limiting — slow down requests to avoid triggering anti-bot
--sleep-requests 2
--sleep-interval 3
--max-sleep-interval 8

# Retry on failure
--retries 5
--retry-sleep linear=1::2

# Abort if too many errors in a playlist rather than hammering the server
--abort-on-unavailable-fragments